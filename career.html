    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/career.css">

<body>

        <div class="header header-pc">
            <div class="container header-container">
                <h1 class="logo">
                    <a href="/">
                        <img src="assets/images/Lumid-logo.svg" alt="루미드 로고">
                    </a>
                </h1>
                <nav>
                    <div class="menu-list-wrap">
                        <ul class="menu-list">
                            <li class="menu">

                            </li>
                            <li class="menu">
                                <a href="#">게임소개</a>
                            </li>
                            <li class="menu">

                            <li class="menu career">
                                <a href="#">채용</a>
                            </li>
                        </ul>
                    </div>
                </nav>
                <div class="translation">
                    <div class="trans-top">
                    <p>KO</p>
                    <button class="trans-down-btn">
                        <img src="assets/images/down-icon.svg" alt="down">
                    </button>
                    </div>
                    <div class="trans-down-list">
                        <ul class="trans-option">
                            <li>
                                <a href="#">

                            <li>
                                <a href="#">

                            </li>

        <div class="header header-mo">
            <div class="header-container">
                <h2 class="logo-mo">
                    <a href="/">
                        <img src="assets/images/Lumid-logo.svg" alt="루미드 로고">
                    </a>
                </h2>
                <button class="menu-btn">
                    <svg width="30" height="30" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 1H17M4 7H17M7 13H17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="header-mo mo-nav">
                <div class="header-container">
                    <h2 class="logo-mo">
                        <a href="/">
                            <img src="assets/images/Lumid-logo.svg" alt="루미드 로고">
                        </a>
                    </h2>
                    <button class="close-btn">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.725 7.075L14.1375 11.4875L11.4875 14.1375L7.075 9.725L2.65 14.15L0 11.5L4.425 7.075L0 2.65L2.65 0L7.075 4.425L11.5 0.0124997L14.15 2.6625L9.725 7.075Z" fill="white"/>
                        </svg>

                    </button>
                </div>
                <div class="mo-menu">
                    <div class="translation-mo">
                        <a href="#" class="on">KO</a>
                        <a href="#">EN</a>
                        <a href="#">JP</a>
                    </div>
                    <nav>
                        <div class="menu-list-wrap-mo">
                            <ul class="menu-list-mo">
                                <li class="menu">
                                    <a href="#">회사소개</a>
                                </li>
                                <li class="menu">
                                    <a href="#">게임소개</a>
                                </li>
                                <li class="menu">
                                    <a href="./news.html">새소식</a>
                                </li>
                                <li class="menu">
                                    <a href="#">채용</a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <div class="header-popup">
        <div class="notice-wrap">
            <p>Notice</p>
            <button class="popup-close">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.725 7.075L14.1375 11.4875L11.4875 14.1375L7.075 9.725L2.65 14.15L0 11.5L4.425 7.075L0 2.65L2.65 0L7.075 4.425L11.5 0.0124997L14.15 2.6625L9.725 7.075Z" fill="#1B1F33"/>
                </svg>
            </button>
        </div>
        <p>해당 기능은 준비 중입니다 :D</p>
    </div>
    
    <main>
        <section class="kv-sec">
            <img src="./assets/images/career_kv.png" alt="kv-img">
            <div class="kv-text container">
                <h2 class="kv-title" data-aos="fade-up"
                data-aos-duration="1500">
                    이야기를 만들어갈<br>
                    당신을 기다립니다
                </h2>
                <p class="kv-sub" data-aos="fade-up"
                data-aos-duration="1500">
                    플레이어의 일상에 작은 마법을<br>
                    더하는 여정에 함께해주세요
                </p>
            </div>
        </section>

                <p>주소 : 서울특별시 은하수 별으로 87 · ☏ 02-111-1111</p>
                <p>Lumid © 2025 All Rights Reserved</p>
                <div class="footer-link">
                    <a href="#">
                        [이용약관]
                    </a>
                    <a href="#">
                        [개인정보처리방침]
                    </a>

            <div class="footer-sns">
                <a href="https://x.com/?lang=ko" target="_blank">
                    <img src="./assets/images/sns(x)-icon.svg" alt="x">

                <a href="https://www.instagram.com/" target="_blank">
                    <img src="./assets/images/sns(insta)-icon.svg" alt="instar">

            </div>
        </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/career.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

        AOS.init();
